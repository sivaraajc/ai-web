<div class="chat-container" [ngClass]="{'chat-open': isChatOpen}">

  <!-- Left column: Avatar -->
  <div class="left-col">
    <app-avatar></app-avatar>
  </div>

  <!-- Right column: only visible when chat open -->
  <div class="right-col" *ngIf="isChatOpen">

    <div class="chat-content" #chatContent>
      <div *ngFor="let msg of messages" [ngClass]="msg.sender">
        <p>{{ msg.text }}</p>
      </div>
      <div *ngIf="loading" class="typing-wrapper">
  <span class="loader"></span>
</div>
    </div>

    <div class="chat-footer">
      <input
        #chatInput
        [(ngModel)]="userMessage"
        (keydown.enter)="onSendMessage()"
        placeholder="Type a message..."
      />
      <button (click)="onSendMessage()">
        <mat-icon>send</mat-icon>
      </button>
    </div>

  </div>

  <!-- Bottom bar always visible -->
  <div class="dd">
    <div class="action-buttons">
      <button
        class="action-btn chat-btn"
        [ngClass]="{'active': isChatOpen}"
        (click)="openChatInput()"
      >
        <mat-icon>chat</mat-icon>
      </button>
      <button class="action-btn mic-btn">
        <mat-icon>mic</mat-icon>
      </button>
    </div>
  </div>

</div>
