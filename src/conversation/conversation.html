<div class="chat-container" [ngClass]="{'chat-open': isChatOpen}">

  <div class="ambient" aria-hidden="true">
    <span class="ambient-orb ambient-orb--a"></span>
    <span class="ambient-orb ambient-orb--b"></span>
  </div>

  <div class="left-col">
    <div class="avatar-stage">
      <app-avatar #avatarRef></app-avatar>
    </div>

    <nav class="avatar-dock" *ngIf="!isChatOpen" aria-label="Conversation controls">
      <button
        type="button"
        class="dock-btn dock-btn--primary"
        (click)="openChatInput()"
        aria-label="Open chat"
      >
        <mat-icon>chat</mat-icon>
        <span>Chat</span>
      </button>
      <button
        type="button"
        class="dock-btn"
        [class.dock-btn--listening]="isMicMode"
        (click)="toggleMicrophone()"
        [attr.aria-pressed]="isMicMode"
        aria-label="Voice input"
      >
        <mat-icon>mic</mat-icon>
        <span>{{ isMicMode ? 'Listening' : 'Voice' }}</span>
      </button>
    </nav>
  </div>

  <aside class="right-col" *ngIf="isChatOpen" role="complementary" aria-label="Chat">

    <header class="chat-header">
      <div class="chat-header-avatar" aria-hidden="true">D</div>
      <div class="chat-header-text">
        <h2 class="chat-header-title">Davies</h2>
        <p class="chat-header-status" [class.chat-header-status--live]="!loading">
          {{ loading ? 'Thinking…' : 'Online' }}
        </p>
      </div>
      <button
        type="button"
        class="chat-close-btn"
        (click)="openChatInput()"
        aria-label="Close chat"
      >
        <mat-icon>close</mat-icon>
      </button>
    </header>

    <div class="chat-content" #chatContent role="log" aria-live="polite">
      <div class="chat-empty" *ngIf="messages.length === 0 && !loading">
        <mat-icon class="chat-empty-icon">forum</mat-icon>
        <p class="chat-empty-title">Start a conversation</p>
        <p class="chat-empty-hint">Ask Davies anything — type or tap the mic.</p>
      </div>

      <div
        *ngFor="let msg of messages"
        class="message-row"
        [ngClass]="msg.sender"
      >
        <div class="message-bubble">
          <p>{{ msg.text }}</p>
        </div>
      </div>

      <div class="message-row ai" *ngIf="loading">
        <div class="message-bubble message-bubble--typing">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>
    </div>

    <footer class="chat-composer">
      <button
        type="button"
        class="composer-btn composer-btn--mic"
        [class.composer-btn--listening]="isMicMode"
        (click)="toggleMicrophone()"
        [attr.aria-pressed]="isMicMode"
        [attr.aria-label]="isMicMode ? 'Stop listening' : 'Voice input'"
      >
        <mat-icon>mic</mat-icon>
      </button>

      <div class="composer-field">
        <input
          #chatInput
          type="text"
          [(ngModel)]="userMessage"
          (keydown.enter)="onSendMessage()"
          [disabled]="loading"
          [placeholder]="loading ? 'Davies is thinking…' : 'Message Davies…'"
          aria-label="Message input"
        />
      </div>

      <button
        type="button"
        class="composer-btn composer-btn--send"
        (click)="onSendMessage()"
        [disabled]="loading || !userMessage.trim()"
        [class.composer-btn--active]="!loading && !!userMessage.trim()"
        [attr.aria-label]="loading ? 'Waiting' : 'Send message'"
      >
        <mat-icon>{{ loading ? 'hourglass_top' : 'send' }}</mat-icon>
      </button>
    </footer>

  </aside>

</div>
